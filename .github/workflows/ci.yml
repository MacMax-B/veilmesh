name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download and verify modules
        run: |
          go mod download
          go mod verify

      - name: Check formatting and module files
        shell: bash
        run: |
          mapfile -d '' files < <(git ls-files -z '*.go')
          unformatted="$(gofmt -l "${files[@]}")"
          if [[ -n "$unformatted" ]]; then
            printf 'The following files need gofmt:\n%s\n' "$unformatted"
            exit 1
          fi
          go mod tidy -diff
          git diff --check

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Race test
        run: go test -race -count=1 ./...

      - name: Check known reachable vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 -show verbose ./...

      - name: Cross-compile supported targets
        run: |
          GOOS=linux GOARCH=amd64 go build ./...
          GOOS=darwin GOARCH=arm64 go build ./...
          GOOS=windows GOARCH=amd64 go build ./...

      - name: Verify reproducible node build
        shell: bash
        run: |
          build_dir="$(mktemp -d)"
          trap 'rm -rf "$build_dir"' EXIT
          go build -trimpath -buildvcs=false -ldflags='-buildid=' -o "$build_dir/node-a" ./cmd/propagare-node
          go build -trimpath -buildvcs=false -ldflags='-buildid=' -o "$build_dir/node-b" ./cmd/propagare-node
          cmp "$build_dir/node-a" "$build_dir/node-b"

  platform-persistence:
    name: Persistence (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test platform persistence and locking
        run: go test -count=1 ./client ./node
